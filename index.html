    <section>
      <h2>What is STVR Doorman?</h2>
      <p>
        STVR Doorman is a free and open-source platform for municipalities, counties, HOAs, and community groups
        to monitor, map, and manage Short-Term Vacation Rentals (STVRs). It brings together:
      </p>
      <ul>
        <li>Interactive maps of licensed STVR properties</li>
        <li>Links to Airbnb, VRBO, and other platform listings</li>
        <li>Public complaint submission and visibility via Google Forms linked to automated update scripts</li>
        <li>Customizable levels of transparency for public reporting and data sharing</li>
        <li>Occupancy limit calculations and over-limit detection</li>
        <li>Municipal boundary and parcel-based approximate address mapping</li>
      </ul>

      <p>
        The platform features customizable levels of transparency so communities can tailor reporting to local policies.
        Complaints can be configured to be entirely public by default, moderated before publishing, made public only after official verification,
        or kept private for internal code enforcement use only.
      </p>

      <p>
        The platform uses open tools like <code>MapLibre GL</code>, GeoJSON, Shapefiles, and Google Forms.
        Hosting options are available entirely for free on GitHub Pages and GitHub repositories.
        With the right data files—municipal boundaries, parcel data, and a list of licensed STVRs—any jurisdiction
        can deploy a fully functional STVR map and complaint portal at zero cost.
      </p>

      <div class="highlight">
        <strong>Open data & script automation example:</strong>
        Municipalities can use open GIS portals such as
        <a href="https://data-sagis.opendata.arcgis.com/" target="_blank" rel="noopener">
          https://data-sagis.opendata.arcgis.com/
        </a>
        to obtain boundary and parcel data. Public complaints submitted through Google Forms run a lightweight backend script
        that automatically processes entries so the complaints map and data layers update seamlessly according to your chosen transparency settings.
      </div>

      <p>
        STVR Doorman is designed so that any municipality can revert to the free tier at any time.
        Paid tiers add setup, customization, hosting, automation, and enforcement tools—but the core platform
        always remains free and open.
      </p>

      <p>
        Community support is available via a public GitHub repository for bug reports and feature requests.
        No direct support is included in the free tier, but the code and documentation are open to everyone.
      </p>
    </section>

    <section>
      <h2>Tier Details</h2>

      <h3>Free Tier - Open Source, Zero Cost</h3>
      <p><strong>Best for:</strong> Cities with technical staff or GIS capability.</p>
      <p><strong>Includes:</strong></p>
      <ul>
        <li>Full STVR mapping using MapLibre GL</li>
        <li>Display of licensed properties and platform links (Airbnb, VRBO, etc.)</li>
        <li>Public-facing portal with a Google Form for complaints tied to an automated update script</li>
        <li>Configurable transparency settings (public by default, moderated, or verified-only)</li>
        <li>Free hosting options available directly on GitHub</li>
        <li>Unlimited properties and submissions</li>
